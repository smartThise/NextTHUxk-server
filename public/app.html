<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NextTHUxk - 下一代选课</title>
<link rel="stylesheet" href="css/content.css">
</head>
<body>

<div class="nx-header">
  <div class="nx-logo">
    ✨ NextTHUxk &nbsp;|&nbsp; 下一代选课
    <span id="phase-tag" style="display:none;font-size:11px;background:rgba(255,149,0,.15);color:#ff9500;padding:2px 8px;border-radius:6px;margin-left:6px"></span>
  </div>
  <div class="nx-header-btns">
    <span id="cache-info" style="font-size:11px;color:#86868b"></span>
    <button id="sem-btn" style="border:1px solid rgba(124,106,239,.3);background:rgba(124,106,239,.08);color:#7c6aef" title="点击修改学期"></button>
    <button id="grade-btn" style="border:1px solid rgba(52,199,89,.3);background:rgba(52,199,89,.08);color:#34c759" title="点击修改年级">未设置</button>
    <button id="refresh-btn">🔄 刷新数据</button>
    <button id="refresh-queue-btn" style="display:none;border:1px solid rgba(255,149,0,.3);background:rgba(255,149,0,.08);color:#ff9500">📊 刷新队列</button>
  </div>
</div>

<div class="nx-main">
  <div class="nx-left">
    <div class="nx-search-bar">
      <div class="nx-search-wrap">
        <input type="text" class="nx-search" id="search" placeholder="🔍 搜索课程名称、教师、课程号…">
        <button class="nx-search-clear" id="search-clear">×</button>
      </div>
      <div class="nx-filters" id="filters">
        <button class="nx-chip on" data-f="all">全部</button>
        <button class="nx-chip" data-f="available">可选</button>
        <button class="nx-chip" data-f="selected">已选</button>
        <button class="nx-chip" data-f="required">必修</button>
        <button class="nx-chip" data-f="elective">限选</button>
        <button class="nx-chip" data-f="sports">体育</button>
        <button class="nx-chip" data-f="queue">我的队列</button>
        <button class="nx-chip" data-f="plan">培养方案</button>
      </div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <select id="f-conflict" class="nx-zy-select" style="flex:1"><option value="">不限制冲突</option><option value="noconflict">仅无冲突</option><option value="conflict">仅冲突</option></select>
        <select id="f-credits" class="nx-zy-select" style="flex:1"><option value="">全部学分</option><option value="1">1学分</option><option value="2">2学分</option><option value="3">3学分</option><option value="4">4学分</option><option value="5+">5+学分</option></select>
        <select id="f-day" class="nx-zy-select" style="flex:1"><option value="">不限周次</option><option value="1">周一</option><option value="2">周二</option><option value="3">周三</option><option value="4">周四</option><option value="5">周五</option><option value="6">周六</option><option value="7">周日</option></select>
        <select id="f-period" class="nx-zy-select" style="flex:1"><option value="">不限大节</option><option value="1">第1大节</option><option value="2">第2大节</option><option value="3">第3大节</option><option value="4">第4大节</option><option value="5">第5大节</option><option value="6">第6大节</option></select>
      </div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        <select id="f-tongshi" class="nx-zy-select" style="flex:1;min-width:100px"><option value="">通识课组: 不限</option><option value="TS1">人文课组</option><option value="TS2">社科课组</option><option value="TS3">艺术课组</option><option value="TS4">科学课组</option></select>
        <select id="f-feature" class="nx-zy-select" style="flex:1;min-width:120px">
          <option value="">课程特色: 不限</option>
          <option value="专题研讨课">专题研讨课</option>
          <option value="全外文授课">全外文授课</option>
          <option value="外文授课比例≥50%">双语课(外文≥50%)</option>
          <option value="外文教材">双语课(外文教材)</option>
          <option value="实践课">实践课</option>
          <option value="实验课">实验课</option>
          <option value="挑战性学习">挑战性学习课程</option>
          <option value="文化素质核心课">文化素质核心课</option>
          <option value="文化素质课">文化素质课</option>
          <option value="新生研讨课">新生研讨课</option>
          <option value="混合式教学">混合式教学</option>
          <option value="精品课">精品课</option>
          <option value="认证外文课">认证外文课</option>
          <option value="通识荣誉课">通识荣誉课</option>
          <option value="通识选修课">通识选修课</option>
          <option value="语言类">语言类课程</option>
          <option value="通识英语">通识英语</option>
          <option value="公共英语">公共英语</option>
        </select>
        <select id="f-grade" class="nx-zy-select" style="flex:1;min-width:100px"><option value="">年级: 不限</option><option value="2026">2026级</option><option value="2025">2025级</option><option value="2024">2024级</option><option value="2023">2023级</option><option value="2022">2022级</option><option value="2021">2021级</option><option value="2020">2020级</option><option value="2019">2019级</option></select>
        <select id="f-bksrem" class="nx-zy-select" style="flex:1;min-width:100px"><option value="">本科余量: 不限</option><option value=">0">本科余量&gt;0</option></select>
        <select id="f-yjsrem" class="nx-zy-select" style="flex:1;min-width:100px"><option value="">研院余量: 不限</option><option value=">0">研究生余量&gt;0</option></select>
      </div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input type="text" id="f-xknote" class="nx-inp" style="flex:1;padding:6px 10px;font-size:12px" placeholder="选课文字说明搜索">
      </div>
    </div>
    <div class="nx-list" id="list"><div class="nx-empty"><span class="nx-spin"></span>&ensp;正在加载数据…</div></div>
  </div>
  <div class="nx-right">
    <div class="nx-sec">
      <div class="nx-sec-title">📋 我的培养方案</div>
      <div id="plan" class="nx-plans"><div class="nx-st">等待加载…</div></div>
      <div id="plan-detail" style="margin-top:8px;font-size:12px;color:#86868b"></div>
    </div>
    <div class="nx-sec">
      <div class="nx-sec-title">📅 课表预览 <span id="preview-info" style="font-size:11px;color:#86868b;font-weight:400"></span></div>
      <div id="preview-tt"><div class="nx-st">选课后自动生成预览</div></div>
      <button class="nx-stage-btn" id="preview-reset" style="display:none;margin-top:6px">📅 返回当前已选课表</button>
    </div>
    <div class="nx-sec">
      <div class="nx-sec-title">💾 暂存课表</div>
      <div id="stage-list"><div class="nx-st">暂无暂存课程</div></div>
      <div id="stage-conflict" style="margin-top:4px"></div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <input type="text" class="nx-inp" id="draft-name" placeholder="草稿名称（如：方案A）" style="flex:1;padding:6px 10px;font-size:12px;min-width:120px">
        <button class="nx-stage-btn" id="save-draft">💾 保存草稿</button>
        <button class="nx-stage-btn" id="save-selected">📋 存当前选课</button>
        <button class="nx-stage-btn" id="preview-stage-btn">📅 预览暂存</button>
        <button class="nx-stage-btn" id="export-btn">📤 导出</button>
        <button class="nx-stage-btn" id="import-btn">📥 导入</button>
      </div>
      <div id="import-area" style="display:none;margin-top:6px">
        <textarea class="nx-inp nx-ta" id="import-data" placeholder="粘贴导出的课表数据…" style="font-size:11px"></textarea>
        <div style="display:flex;gap:6px;margin-top:4px">
          <button class="nx-stage-btn" id="import-ok">确认导入到暂存区</button>
          <button class="nx-stage-btn" id="import-cancel" style="color:#ff3b30;border-color:rgba(255,59,48,.3)">取消</button>
        </div>
      </div>
      <div id="drafts" style="margin-top:8px"></div>
    </div>
    <div class="nx-sec">
      <div class="nx-sec-title">🔑 AI 配置</div>
      <div class="nx-ai">
        <input type="text" class="nx-inp" id="ai-api" placeholder="API Base URL（如 https://api.openai.com/v1）">
        <input type="text" class="nx-inp" id="ai-model" placeholder="模型名称（如 gpt-4o-mini、deepseek-chat）">
        <input type="password" class="nx-inp" id="ai-token" placeholder="API Token">
        <textarea class="nx-inp nx-ta" id="ai-pref" placeholder="我的选课偏好（如：周五下午空出来、优先给分好的老师、学分凑满30）"></textarea>
      </div>
    </div>
    <div class="nx-sec">
      <div class="nx-sec-title">🔍 AI 课程搜索</div>
      <div style="font-size:11px;color:#86868b;margin-bottom:8px">基于当前筛选结果 + 当前预览课表，AI 在不冲突的课程中推荐</div>
      <div class="nx-ai">
        <textarea class="nx-inp nx-ta" id="ai-search-prompt" placeholder="描述你想要的课（如：想选一门好拿A的通识课、周四下午有空的任选、推荐一门有趣的体育课…）" style="min-height:56px"></textarea>
        <button class="nx-ai-btn" id="ai-search-btn" style="background:linear-gradient(135deg,#007aff,#5856d6)">🔍 AI 搜索推荐</button>
        <div id="ai-search-st" class="nx-st"></div>
        <div id="ai-search-results"></div>
      </div>
    </div>
    <div class="nx-sec">
      <div class="nx-sec-title">🚀 AI 智能排课</div>
      <div style="font-size:11px;color:#86868b;margin-bottom:8px">AI 根据必修/体育课 + 偏好自动生成完整课表方案</div>
      <div class="nx-ai">
        <button class="nx-ai-btn" id="ai-btn">🚀 AI 智能排课</button>
        <div id="ai-st" class="nx-st"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="nx-toast"></div>

<!-- Course Detail Modal -->
<div class="nx-modal-mask" id="modal">
  <div class="nx-modal">
    <div class="nx-modal-head">
      <div class="nx-modal-title" id="modal-title">课程详情</div>
      <button class="nx-modal-close" id="modal-close">✕</button>
    </div>
    <div class="nx-modal-body" id="modal-body"><div class="nx-modal-loading">加载中…</div></div>
  </div>
</div>

<!-- ZY (Volunteer) Confirmation Modal -->
<div class="nx-zy-modal-mask" id="zy-modal">
  <div class="nx-zy-modal">
    <div class="nx-zy-modal-head">
      <div class="nx-zy-modal-title">📋 志愿信息确认</div>
      <button class="nx-modal-close" id="zy-modal-close">✕</button>
    </div>
    <div class="nx-zy-modal-body" id="zy-modal-body"></div>
    <div class="nx-zy-modal-foot">
      <button class="nx-zy-ok" id="zy-modal-ok">确认</button>
    </div>
  </div>
</div>

<!-- JS Modules (load order matters) -->
<script src="js/config.js"></script>
<script src="js/probability.js"></script>
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/ai.js"></script>
<script src="js/app.js"></script>

</body>
</html>
